<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Digital Bloom</title>
    <style>
        /* Minimalist, Premium Dark Aesthetic */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Removes ugly blue flash on mobile tap */
        }

        body {
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container for the canvas and elements */
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
        }

        canvas {
            display: block;
            background: transparent;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        /* Upgraded Alive Glassmorphic Button */
        .bloom-btn {
            position: absolute;
            bottom: 220px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            
            /* Glass border & blur */
            border: 1px solid rgba(255, 192, 203, 0.3); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            color: #ffc0cb;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px; /* Perfectly round pill/circular style */
            
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;

            /* Infinite breathing ambient pulse heartbeat */
            animation: breatheGlow 3s infinite ease-in-out;
        }

        /* Tactile click/touch state for mobile phones */
        .bloom-btn:active {
            transform: scale(0.95);
            background: rgba(255, 192, 203, 0.15);
            border-color: rgba(255, 192, 203, 0.7);
            box-shadow: 0 0 25px rgba(255, 192, 203, 0.4);
        }

        /* Glowing heartbeat animation logic */
        @keyframes breatheGlow {
            0% {
                box-shadow: 0 0 15px rgba(255, 192, 203, 0.15), inset 0 0 10px rgba(255, 192, 203, 0.05);
                border-color: rgba(255, 192, 203, 0.25);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 192, 203, 0.4), inset 0 0 15px rgba(255, 192, 203, 0.1);
                border-color: rgba(255, 192, 203, 0.6);
            }
            100% {
                box-shadow: 0 0 15px rgba(255, 192, 203, 0.15), inset 0 0 10px rgba(255, 192, 203, 0.05);
                border-color: rgba(255, 192, 203, 0.25);
            }
        }

        /* Hidden message that fades in after blooming */
        .message {
            position: absolute;
            top: 10px;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 2s ease, transform 2s ease;
            text-align: center;
            width: 100%;
            padding: 50 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="message" id="loveMessage">"Happy Birthday, Sania! You are the most beautiful in a garden of flowers. Hope you have a wonderful day..."</div>
        <canvas id="flowerCanvas" width="500" height="500"></canvas>
        <button class="bloom-btn" id="bloomBtn">TO THE FUTURE SOFTWARE ENGINEER</button>
    </div>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('bloomBtn');
        const msg = document.getElementById('loveMessage');

        let animationProgress = 0;
        let isBlooming = false;
        let firefliesInitialized = false;

        const config = {
            stemColor: '#abdf8f',
            glowColor: '#ffc0cb', 
            petalColorInside: '#ffffff',
            petalColorOutside: '#ffc0cb',
            fireflyColor: '#fff5cc',
            grassColor: '#8bc34a'
        };

        const fireflies = [];

        class Firefly {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height - (Math.random() * 200);
                this.size = Math.random() * 2.5 + 1;
                this.speedY = Math.random() * 0.4 + 0.2;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.angle = Math.random() * Math.PI * 2;
                this.alpha = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.y -= this.speedY;
                this.angle += 0.02;
                this.x += Math.sin(this.angle) * 0.25 + this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = config.glowColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = config.fireflyColor;
                ctx.fill();
                ctx.restore();
            }
        }

        function initFireflies() {
            for (let i = 0; i < 30; i++) {
                fireflies.push(new Firefly());
            }
            firefliesInitialized = true;
        }

        // Clear canvas initially
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        btn.addEventListener('click', () => {
            if (isBlooming) return; 
            isBlooming = true;
            
            // Clean dynamic disappearing transition
            btn.style.opacity = '0';
            btn.style.transform = 'scale(0.8)';
            btn.style.pointerEvents = 'none';
            
            animateGrowth();
        });

        function animateGrowth() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Fireflies show up when flowers are almost up (progress > 0.8)
            if (animationProgress > 0.8) {
                if (!firefliesInitialized) {
                    initFireflies();
                }
                fireflies.forEach(firefly => {
                    firefly.update();
                    firefly.draw();
                });
            }

            // 2. Increment growth until fully complete
            if (animationProgress < 1) {
                animationProgress += 0.006; 
            } else {
                msg.classList.add('show');
            }

            // 3. Draw Grass Bed
            drawGrassPatch(animationProgress);

            // 4. Always draw the flowers at their current or completed state
            // Far Left (Shortest)
            drawFlower(animationProgress, canvas.width / 2 - 140, 130, -35);
            
            // Far Right (Shortest)
            drawFlower(animationProgress, canvas.width / 2 + 140, 130, 35);

            // Mid Left (Medium)
            drawFlower(animationProgress, canvas.width / 2 - 75, 185, -15);
            
            // Mid Right (Medium)
            drawFlower(animationProgress, canvas.width / 2 + 75, 185, 15);

            // Center Flower (Tallest centerpiece)
            drawFlower(animationProgress, canvas.width / 2, 240, -5);
            
            requestAnimationFrame(animateGrowth);
        }

        function drawGrassPatch(progress) {
            const currentProgress = Math.min(progress, 1);
            const baseHeight = canvas.height;
            const maxGrassHeight = 15;
            const currentHeight = maxGrassHeight * Math.min(currentProgress * 2, 1);

            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = config.stemColor;
            
            ctx.fillStyle = config.grassColor;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 180, baseHeight);
            ctx.quadraticCurveTo(canvas.width / 2, baseHeight - currentHeight, canvas.width / 2 + 180, baseHeight);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = config.stemColor;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            
            const startX = canvas.width / 2 - 170;
            const endX = canvas.width / 2 + 170;
            
            for (let x = startX; x <= endX; x += 12) {
                const distanceFactor = 1 - (Math.abs(canvas.width / 2 - x) / 170);
                const bladeHeight = (10 + Math.sin(x) * 6) * distanceFactor * currentProgress;
                const lean = Math.sin(x) * 5;

                ctx.beginPath();
                ctx.moveTo(x, baseHeight);
                ctx.quadraticCurveTo(x + lean / 2, baseHeight - bladeHeight / 2, x + lean, baseHeight - bladeHeight);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawFlower(progress, centerX, stemHeight, curvatureOffset) {
            const startY = canvas.height;
            const endY = canvas.height - stemHeight;
            const currentProgress = Math.min(progress, 1);
            
            // Draw Stem
            ctx.beginPath();
            ctx.moveTo(centerX - curvatureOffset, startY);
            
            const currentY = startY - (startY - endY) * Math.min(currentProgress * 1.5, 1);
            const cpX = centerX + curvatureOffset * Math.min(currentProgress, 1); 
            const cpY = startY - (startY - endY) * 0.5;
            
            ctx.quadraticCurveTo(cpX, cpY, centerX, currentY);
            ctx.strokeStyle = config.stemColor;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();

                // Leaves (Fixed alignment, unique variations, and alternating directions)
            if (currentProgress > 0.4) {
                let leafProgress = (currentProgress - 0.4) / 0.6;
                
                // Quadratic Bezier curve function helper to find the exact point on the stem
                const getBezierPoint = (t) => {
                    const x = (1 - t) * (1 - t) * (centerX - curvatureOffset) + 2 * (1 - t) * t * cpX + t * t * centerX;
                    const y = (1 - t) * (1 - t) * startY + 2 * (1 - t) * t * cpY + t * t * currentY;
                    return { x, y };
                };

                // Use the flower's curvature to vary heights slightly so they aren't uniform clones
                const upperHeight = 0.38 + (Math.sin(centerX) * 0.05); // e.g., ~38% up the stem
                const lowerHeight = 0.22 + (Math.cos(centerX) * 0.04); // e.g., ~22% up the stem

                const upperLeafPos = getBezierPoint(upperHeight * Math.min(currentProgress * 1.5, 1));
                const lowerLeafPos = getBezierPoint(lowerHeight * Math.min(currentProgress * 1.5, 1));

                // Alternate leaf direction based on whether the stem leans left or right
                const leanLeft = curvatureOffset < 0; 
                
                // Upper leaf points one way, lower leaf points the other way
                drawLeaf(upperLeafPos.x, upperLeafPos.y, leanLeft, leafProgress);
                drawLeaf(lowerLeafPos.x, lowerLeafPos.y, !leanLeft, leafProgress);
            }

            // Draw Flower Head
            if (currentProgress > 0.6) {
                const flowerProgress = (currentProgress - 0.6) / 0.4; 
                const flowerY = endY;
                const maxPetalSize = 55;
                const petalCount = 6;

                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = config.glowColor; 

                for (let i = 0; i < petalCount; i++) {
                    const angle = (i * 2 * Math.PI) / petalCount;
                    drawPetal(centerX, flowerY, maxPetalSize * flowerProgress, angle, config.petalColorOutside);
                }

                for (let i = 0; i < petalCount; i++) {
                    const angle = (i * 2 * Math.PI) / petalCount + (Math.PI / petalCount);
                    drawPetal(centerX, flowerY, (maxPetalSize * 0.7) * flowerProgress, angle, config.petalColorInside);
                }

                ctx.beginPath();
                ctx.arc(centerX, flowerY, 10 * flowerProgress, 0, 2 * Math.PI);
                ctx.fillStyle = '#f5b041'; 
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#f5b041';
                ctx.fill();

                ctx.restore();
            }
        }

        function drawPetal(x, y, radius, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-radius / 2, -radius / 2, -radius / 2, -radius, 0, -radius);
            ctx.bezierCurveTo(radius / 2, -radius, radius / 2, -radius / 2, 0, 0);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.restore();
        }

        function drawLeaf(x, y, isLeft, progress) {
            ctx.save();
            ctx.translate(x, y);
            if (!isLeft) ctx.scale(-1, 1); 
            const size = 30 * Math.min(progress * 1.5, 1);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size, -size/3, -size, -size, 0, -size);
            ctx.bezierCurveTo(size/2, -size/2, size/4, 0, 0, 0);
            ctx.fillStyle = config.stemColor;
            ctx.fill();
            ctx.restore();
        }
    </script>
</body>
</html>
