<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Digital Bloom</title>
    <style>
        /* Minimalist, Premium Dark Aesthetic */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container for perfect centering & alignment */
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 360px;
            height: 500px; /* Aligns with canvas square bounds */
        }

        canvas {
            display: block;
            background: transparent;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        /* Initial UI Wrapper positioned higher on the screen */
        .intro-ui {
            position: absolute;
            top: 140px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px; 
            z-index: 10;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s ease;
        }

        /* Compact Oval Glassmorphic Button */
        .bloom-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 192, 203, 0.3); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffc0cb;
            padding: 12px 20px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            line-height: 1.4;
            text-align: center;
            max-width: 220px;
            width: auto;
            font-weight: 400;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 24px;
            transition: all 0.3s ease;
            animation: breatheGlow 3s infinite ease-in-out;
        }

        .bloom-btn:active {
            transform: scale(0.96);
            background: rgba(255, 192, 203, 0.15);
        }

        /* Click to Start Label Placement */
        .hint-text {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            text-align: center;
            animation: blink 2s infinite ease-in-out;
        }

        /* Mid-Transition Screen positioned higher up */
        .terminal-screen {
            position: absolute;
            top: 140px; 
            width: 85%;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            z-index: 15;
        }

        /* Scaled down, cleaner double-line typography */
        .terminal-text {
            color: #ffffff;
            font-size: 0.72rem; /* Made smaller and cleaner */
            font-weight: 400;
            letter-spacing: 2px;
            line-height: 1.8; /* Added clean breathing space between text lines */
            text-transform: uppercase; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(15px);
        }

        .terminal-screen.reveal {
            opacity: 1;
            visibility: visible;
        }

        .terminal-screen.reveal .terminal-text {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Raised Glowing Pink Countdown Numbers */
        .countdown-display {
            position: absolute;
            top: 110px; /* Shifted up to match the button height region flawlessly */
            font-size: 5.5rem;
            font-weight: 700;
            color: #ffc0cb;
            opacity: 0;
            visibility: hidden;
            z-index: 20;
            text-shadow: 0 0 25px rgba(255, 192, 203, 0.8), 0 0 50px rgba(255, 192, 203, 0.4);
        }

        /* Flash pulse class assigned via JS timing */
        .flash-animation {
            animation: pulseImpact 1s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        /* Target Core Flower Output Text Block */
        .message {
            position: absolute;
            top: 40px;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 2s ease, transform 2s ease;
            text-align: center;
            width: 100%;
            padding: 0 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            z-index: 5;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Keyframe Control Core Blocks --- */
        @keyframes breatheGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 192, 203, 0.15); border-color: rgba(255, 192, 203, 0.25); }
            50% { box-shadow: 0 0 30px rgba(255, 192, 203, 0.45); border-color: rgba(255, 192, 203, 0.6); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.75; }
        }

        @keyframes pulseImpact {
            0% { transform: scale(0.6); opacity: 0; }
            15% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="message" id="loveMessage">"Happy Birthday Saimah! In a world governed by rigid logic and syntax, you are the organic algorithm that makes the whole system bloom."</div>
        
        <canvas id="flowerCanvas" width="500" height="500"></canvas>

        <div class="intro-ui" id="introUi">
            <button class="bloom-btn" id="bloomBtn">To the future<br>software engineer</button>
            <div class="hint-text">Click to start</div>
        </div>

        <div class="terminal-screen" id="terminalScreen">
            <p class="terminal-text" id="terminalText"></p>
        </div>

        <div class="countdown-display" id="countdownDisplay">3</div>
    </div>

    <script>
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');
        const introUi = document.getElementById('introUi');
        const btn = document.getElementById('bloomBtn');
        const msg = document.getElementById('loveMessage');
        const terminalScreen = document.getElementById('terminalScreen');
        const terminalText = document.getElementById('terminalText');
        const countdownDisplay = document.getElementById('countdownDisplay');

        let animationProgress = 0;
        let firefliesInitialized = false;
        const fireflies = [];

        const config = {
            stemColor: '#abdf8f',
            glowColor: '#ffc0cb', 
            petalColorInside: '#ffffff',
            petalColorOutside: '#ffc0cb',
            fireflyColor: '#fff5cc',
            grassColor: '#8bc34a'
        };

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        btn.addEventListener('click', () => {
            introUi.style.opacity = '0';
            introUi.style.transform = 'translateY(-10px)';
            
            setTimeout(() => {
                introUi.style.display = 'none';
                startTerminalSequence();
            }, 800);
        });

        function startTerminalSequence() {
            // Text split neatly over two explicit uppercase lines
            terminalText.innerHTML = "This was built entirely from code.<br>Starting in...";
            
            terminalScreen.classList.add('reveal');
            
            setTimeout(() => {
                terminalScreen.style.transition = 'opacity 0.5s ease';
                terminalScreen.style.opacity = '0';
                setTimeout(() => {
                    terminalScreen.style.display = 'none';
                    runCountdown(3);
                }, 500);
            }, 3500);
        }

        function runCountdown(count) {
            if (count > 0) {
                countdownDisplay.innerText = count;
                countdownDisplay.style.visibility = 'visible';
                
                countdownDisplay.classList.remove('flash-animation');
                void countdownDisplay.offsetWidth; 
                countdownDisplay.classList.add('flash-animation');
                
                setTimeout(() => {
                    runCountdown(count - 1);
                }, 1000);
            } else {
                countdownDisplay.style.display = 'none';
                animateGrowth();
            }
        }

        class Firefly {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height - (Math.random() * 200);
                this.size = Math.random() * 2.5 + 1;
                this.speedY = Math.random() * 0.4 + 0.2;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.angle = Math.random() * Math.PI * 2;
                this.alpha = Math.random() * 0.5 + 0.3;
            }
            update() {
                this.y -= this.speedY;
                this.angle += 0.02;
                this.x += Math.sin(this.angle) * 0.25 + this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = config.glowColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = config.fireflyColor;
                ctx.fill();
                ctx.restore();
            }
        }

        function initFireflies() {
            for (let i = 0; i < 30; i++) { fireflies.push(new Firefly()); }
            firefliesInitialized = true;
        }

        function animateGrowth() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (animationProgress > 0.8) {
                if (!firefliesInitialized) initFireflies();
                fireflies.forEach(f => { f.update(); f.draw(); });
            }

            if (animationProgress < 1) {
                animationProgress += 0.006; 
            } else {
                msg.classList.add('show');
            }

            drawGrassPatch(animationProgress);
            drawFlower(animationProgress, canvas.width / 2 - 140, 130, -35);
            drawFlower(animationProgress, canvas.width / 2 + 140, 130, 35);
            drawFlower(animationProgress, canvas.width / 2 - 75, 185, -15);
            drawFlower(animationProgress, canvas.width / 2 + 75, 185, 15);
            drawFlower(animationProgress, canvas.width / 2, 240, -5);
            
            requestAnimationFrame(animateGrowth);
        }

        function drawGrassPatch(progress) {
            const currentProgress = Math.min(progress, 1);
            const baseHeight = canvas.height;
            const maxGrassHeight = 15;
            const currentHeight = maxGrassHeight * Math.min(currentProgress * 2, 1);

            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = config.stemColor;
            ctx.fillStyle = config.grassColor;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 180, baseHeight);
            ctx.quadraticCurveTo(canvas.width / 2, baseHeight - currentHeight, canvas.width / 2 + 180, baseHeight);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = config.stemColor;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            for (let x = canvas.width / 2 - 170; x <= canvas.width / 2 + 170; x += 12) {
                const distanceFactor = 1 - (Math.abs(canvas.width / 2 - x) / 170);
                const bladeHeight = (10 + Math.sin(x) * 6) * distanceFactor * currentProgress;
                const lean = Math.sin(x) * 5;
                ctx.beginPath();
                ctx.moveTo(x, baseHeight);
                ctx.quadraticCurveTo(x + lean / 2, baseHeight - bladeHeight / 2, x + lean, baseHeight - bladeHeight);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawFlower(progress, centerX, stemHeight, curvatureOffset) {
            const startY = canvas.height;
            const endY = canvas.height - stemHeight;
            const currentProgress = Math.min(progress, 1);
            
            ctx.beginPath();
            ctx.moveTo(centerX - curvatureOffset, startY);
            const currentY = startY - (startY - endY) * Math.min(currentProgress * 1.5, 1);
            const cpX = centerX + curvatureOffset * Math.min(currentProgress, 1); 
            const cpY = startY - (startY - endY) * 0.5;
            
            ctx.quadraticCurveTo(cpX, cpY, centerX, currentY);
            ctx.strokeStyle = config.stemColor;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();

            if (currentProgress > 0.4) {
                let leafProgress = (currentProgress - 0.4) / 0.6;
                const getBezierPoint = (t) => {
                    const x = (1 - t) * (1 - t) * (centerX - curvatureOffset) + 2 * (1 - t) * t * cpX + t * t * centerX;
                    const y = (1 - t) * (1 - t) * startY + 2 * (1 - t) * t * cpY + t * t * currentY;
                    return { x, y };
                };
                const upperLeafPos = getBezierPoint((0.38 + Math.sin(centerX) * 0.05) * Math.min(currentProgress * 1.5, 1));
                const lowerLeafPos = getBezierPoint((0.22 + Math.cos(centerX) * 0.04) * Math.min(currentProgress * 1.5, 1));
                const leanLeft = curvatureOffset < 0; 
                drawLeaf(upperLeafPos.x, upperLeafPos.y, leanLeft, leafProgress);
                drawLeaf(lowerLeafPos.x, lowerLeafPos.y, !leanLeft, leafProgress);
            }

            if (currentProgress > 0.6) {
                const flowerProgress = (currentProgress - 0.6) / 0.4; 
                const maxPetalSize = 55;
                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = config.glowColor; 
                for (let i = 0; i < 6; i++) {
                    drawPetal(centerX, endY, maxPetalSize * flowerProgress, (i * Math.PI) / 3, config.petalColorOutside);
                }
                for (let i = 0; i < 6; i++) {
                    drawPetal(centerX, endY, (maxPetalSize * 0.7) * flowerProgress, (i * Math.PI) / 3 + (Math.PI / 6), config.petalColorInside);
                }
                ctx.beginPath();
                ctx.arc(centerX, endY, 10 * flowerProgress, 0, 2 * Math.PI);
                ctx.fillStyle = '#f5b041'; 
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#f5b041';
                ctx.fill();
                ctx.restore();
            }
        }

        function drawPetal(x, y, radius, angle, color) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle); ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-radius / 2, -radius / 2, -radius / 2, -radius, 0, -radius);
            ctx.bezierCurveTo(radius / 2, -radius, radius / 2, -radius / 2, 0, 0);
            ctx.fillStyle = color; ctx.fill(); ctx.restore();
        }

        function drawLeaf(x, y, isLeft, progress) {
            ctx.save(); ctx.translate(x, y); if (!isLeft) ctx.scale(-1, 1); 
            const size = 30 * Math.min(progress * 1.5, 1); ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size, -size/3, -size, -size, 0, -size);
            ctx.bezierCurveTo(size/2, -size/2, size/4, 0, 0, 0);
            ctx.fillStyle = config.stemColor; ctx.fill(); ctx.restore();
        }
    </script>
</body>
</html>
